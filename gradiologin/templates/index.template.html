<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Sign in</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
  :root {
    --bg: #f3f4f6;
    --card-bg: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #d1d5db;
    --hover: #f9fafb;
    --shadow: 0 1px 3px rgba(0, 0, 0, .08), 0 8px 24px rgba(0, 0, 0, .06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111827;
      --card-bg: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #4b5563;
      --hover: #374151;
      --shadow: 0 1px 3px rgba(0, 0, 0, .4), 0 8px 24px rgba(0, 0, 0, .3);
    }
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }

  .card {
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    margin: 24px;
    text-align: center;
  }

  .card h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 6px;
  }

  .card p {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 28px;
  }

  .provider-button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 11px 18px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: background-color .15s ease, box-shadow .15s ease;
  }

  .provider-button:hover {
    background: var(--hover);
    box-shadow: 0 1px 2px rgba(0, 0, 0, .12);
  }

  .provider-button i {
    font-size: 18px;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Welcome</h1>
    <p>Sign in to continue</p>
    {% for provider in providers %}
    <a class="provider-button" href="/login/{{ provider.name }}">
      {% if provider.icon %}<i class="fa-brands fa-{{ provider.icon }}" aria-hidden="true"></i>{% endif %}
      Sign in with {{ provider.name|capitalize }}
    </a>
    {% endfor %}
  </main>
</body>
</html>
